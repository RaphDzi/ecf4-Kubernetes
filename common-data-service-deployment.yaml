apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: C:\ProgramData\chocolatey\lib\kubernetes-kompose\tools\kompose.exe convert
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: common-data-service
  name: common-data-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: common-data-service
  template:
    metadata:
      annotations:
        kompose.cmd: C:\ProgramData\chocolatey\lib\kubernetes-kompose\tools\kompose.exe convert
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: common-data-service
    spec:
      containers:
        - env:
            - name: ACTIVE_PROFILE
              value: dev
            - name: DB_HOST
              value: mysql
            - name: DB_PASS
              value: mypass
            - name: DB_PORT
              value: "3306"
            - name: DB_SCHEMA
              value: ecommerce_app_database
            - name: DB_USER
              value: mysqluser
            - name: PORT
              value: "9000"
            - name: REACT_CLIENT_URL
              value: http://localhost:3000
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PASSWORD
              value: mypass
            - name: REDIS_PORT
              value: "6379"
          image: common-data-service
          livenessProbe:
            exec:
              command:
                - curl
                - -f
                - http://localhost:9000/actuator/health
            failureThreshold: 3
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          name: ecommerce-common-data
          ports:
            - containerPort: 9000
              protocol: TCP
      restartPolicy: Always
