apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: C:\ProgramData\chocolatey\lib\kubernetes-kompose\tools\kompose.exe convert
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: authentication-service
  name: authentication-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: authentication-service
  template:
    metadata:
      annotations:
        kompose.cmd: C:\ProgramData\chocolatey\lib\kubernetes-kompose\tools\kompose.exe convert
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: authentication-service
    spec:
      containers:
        - env:
            - name: ACTIVE_PROFILE
              value: dev
            - name: DB_HOST
              value: mysql
            - name: DB_PASS
              value: mypass
            - name: DB_PORT
              value: "3306"
            - name: DB_SCHEMA
              value: ecommerce_app_database
            - name: DB_USER
              value: mysqluser
            - name: PORT
              value: "7000"
            - name: REACT_CLIENT_URL
              value: http://localhost:3000
          image: authentication-service
          livenessProbe:
            exec:
              command:
                - curl
                - -f
                - http://localhost:7000/actuator/health
            failureThreshold: 3
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          name: ecommerce-auth
          ports:
            - containerPort: 7000
              protocol: TCP
      restartPolicy: Always
