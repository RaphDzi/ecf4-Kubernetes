apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: C:\ProgramData\chocolatey\lib\kubernetes-kompose\tools\kompose.exe convert
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: payment-service
  name: payment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: payment-service
  template:
    metadata:
      annotations:
        kompose.cmd: C:\ProgramData\chocolatey\lib\kubernetes-kompose\tools\kompose.exe convert
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: payment-service
    spec:
      containers:
        - env:
            - name: ACTIVE_PROFILE
              value: dev
            - name: PORT
              value: "9050"
            - name: REACT_CLIENT_URL
              value: http://localhost:3000
          image: payment-service
          livenessProbe:
            exec:
              command:
                - curl
                - -f
                - http://localhost:9050/actuator/health
            failureThreshold: 3
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          name: ecommerce-payment
          ports:
            - containerPort: 9050
              protocol: TCP
      restartPolicy: Always
