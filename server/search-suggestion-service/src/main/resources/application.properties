spring.application.name=search-suggestion-service
server.port=${PORT:10000}
spring.profiles.active=${ACTIVE_PROFILE:dev}

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_SCHEMA:ecommerce_app_database}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USER:mysqluser}
spring.datasource.password=${DB_PASS:mypass}

spring.cache.redis.time-to-live=600

spring.jpa.properties.hibernate.format_sql=true